<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Edelweiss Café - Online Παραγγελίες</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f5f0e8; padding-bottom: 80px; }
    header { background: #1e3a1e; color: white; text-align: center; padding: 20px; position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 1.5em; margin-bottom: 10px; }
    .table-selector { background: #2d5a2d; padding: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; }
    .table-selector label { font-weight: bold; }
    .table-selector select { padding: 12px 15px; font-size: 16px; border-radius: 12px; border: none; }
    .categories { display: flex; overflow-x: auto; padding: 15px; gap: 10px; background: white; border-bottom: 1px solid #ddd; -webkit-overflow-scrolling: touch; }
    .cat-btn { padding: 10px 24px; border: 1px solid #1e3a1e; background: white; border-radius: 40px; cursor: pointer; white-space: nowrap; font-size: 15px; font-weight: 500; }
    .cat-btn.active { background: #1e3a1e; color: white; }
    .products { padding: 15px; max-width: 800px; margin: 0 auto; margin-bottom: 200px; }
    .product {
      background: white;
      border-radius: 20px;
      margin-bottom: 20px;
      padding: 15px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .product-main {
      display: flex;
      gap: 15px;
      align-items: center;
    }
    .product img { width: 80px; height: 80px; object-fit: cover; border-radius: 16px; }
    .product-info { flex: 1; }
    .product-name { font-size: 1.2em; font-weight: bold; color: #1e3a1e; }
    .product-desc { font-size: 0.8em; color: #666; margin: 5px 0; }
    .product-price { font-size: 1.3em; font-weight: bold; color: #d4af37; }
    
    .add-btn {
      background: #1e3a1e;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      width: 100%;
      margin-top: 12px;
      transition: 0.2s;
    }
    .add-btn:active { transform: scale(0.97); background: #0e2a0e; }
    
    .cart { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 3px solid #1e3a1e; padding: 15px; max-height: 55%; overflow-y: auto; box-shadow: 0 -4px 20px rgba(0,0,0,0.15); border-radius: 20px 20px 0 0; }
    .cart h3 { color: #1e3a1e; margin-bottom: 10px; font-size: 1.3em; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; gap: 10px; flex-wrap: wrap; }
    .cart-item-details { flex: 2; }
    .cart-item-options { font-size: 0.75em; color: #666; margin-top: 5px; font-style: italic; }
    .green-plus-btn {
      background: #2ecc40;
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 30px;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      transition: 0.1s;
    }
    .green-plus-btn:active { transform: scale(0.95); background: #27ae30; }
    .cart-item-controls { display: flex; align-items: center; gap: 8px; }
    .cart-total { font-weight: bold; font-size: 1.3em; margin: 12px 0; text-align: right; }
    .submit-btn { background: #d4af37; color: #1e3a1e; border: none; padding: 14px 25px; border-radius: 40px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; }
    .remove-btn { background: #ff4444; color: white; border: none; padding: 6px 14px; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 14px; }
    
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-content {
      background: white;
      border-radius: 32px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 85%;
      overflow-y: auto;
    }
    .modal-content h3 { margin-bottom: 20px; color: #1e3a1e; }
    .modal-option-group { margin-bottom: 20px; }
    .modal-option-group label { font-weight: bold; display: block; margin-bottom: 10px; color: #1e3a1e; }
    .modal-buttons { display: flex; gap: 12px; margin-top: 24px; }
    .modal-buttons button { flex: 1; padding: 12px; border-radius: 40px; font-weight: bold; cursor: pointer; }
    .save-edit-btn { background: #1e3a1e; color: white; border: none; }
    .close-modal-btn { background: #ddd; border: none; }
    .radio-group-modal { display: flex; flex-wrap: wrap; gap: 12px; }
    .radio-group-modal label { font-weight: normal; display: inline-flex; align-items: center; gap: 6px; background: #f0ebe4; padding: 8px 16px; border-radius: 40px; cursor: pointer; }
    .radio-group-modal input { width: 18px; height: 18px; }
    textarea { width: 100%; padding: 12px; border-radius: 16px; border: 1px solid #ccc; font-size: 14px; font-family: inherit; resize: vertical; }
  </style>
</head>
<body>
  <header>
    <h1>☕ Edelweiss Café</h1>
    <div class="table-selector">
      <label>📍 Τραπέζι:</label>
      <select id="tableSelect"></select>
    </div>
  </header>
  <div class="categories" id="categories"></div>
  <div class="products" id="products"></div>
  <div class="cart" id="cart">
    <h3>🛒 Καλάθι</h3>
    <div id="cartItems"></div>
    <div class="cart-total" id="cartTotal">Σύνολο: 0.00 €</div>
    <button class="submit-btn" id="submitOrder">✅ Υποβολή Παραγγελίας</button>
  </div>

  <div id="editModal" class="modal"><div class="modal-content"><h3 id="editProductName">✏️ Επιλογές</h3><div id="editOptions"></div><div class="modal-buttons"><button class="close-modal-btn" onclick="closeModal()">Ακύρωση</button><button class="save-edit-btn" onclick="saveEdit()">Αποθήκευση</button></div></div></div>
  <div id="commentModal" class="modal"><div class="modal-content"><h3 id="commentProductName">✏️ Σχόλιο για το προϊόν</h3><textarea id="commentText" rows="4" placeholder="π.χ. χωρίς αλάτι, χωρίς μανιτάρια, χωρίς κρεμμύδι..."></textarea><div class="modal-buttons"><button class="close-modal-btn" onclick="closeCommentModal()">Ακύρωση</button><button class="save-edit-btn" onclick="saveComment()">Αποθήκευση</button></div></div></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBzp2V3rskL_B2vVqIa2ding3AoUPLVUyA",
      authDomain: "edelweisscafeplus.firebaseapp.com",
      databaseURL: "https://edelweisscafeplus-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "edelweisscafeplus",
      storageBucket: "edelweisscafeplus.firebasestorage.app",
      messagingSenderId: "643023210296",
      appId: "1:643023210296:web:45d0e77431f946249023cd"
    };
    firebase.initializeApp(firebaseConfig);

    let menuData = { tables: [], categories: [], products: [] };
    let cart = [];
    let currentCategory = null;
    let editIndex = null;
    let commentEditIndex = null;

    // ΒΑΛΕ ΕΔΩ ΤΑ ID ΤΩΝ ΚΑΤΗΓΟΡΙΩΝ ΟΠΩΣ ΕΙΝΑΙ ΜΕΣΑ ΣΤΟ order.json
    const categoriesWithOptions = ['kafe', 'rofimata'];
    const categoriesWithComment = ['sandwich', 'proina', 'salates', 'fastfood', 'pagota'];

    async function loadData() {
      const response = await fetch('../order.json?' + Date.now());
      menuData = await response.json();
      const select = document.getElementById('tableSelect');
      menuData.tables.forEach(t => { select.innerHTML += `<option value="${t}">Τραπέζι ${t}</option>`; });
      renderCategories();
      if (menuData.categories[0]) showCategory(menuData.categories[0].id);
    }

    function renderCategories() {
      const container = document.getElementById('categories');
      container.innerHTML = '';
      menuData.categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `cat-btn ${cat.id === currentCategory ? 'active' : ''}`;
        btn.textContent = cat.name.el;
        btn.onclick = () => showCategory(cat.id);
        container.appendChild(btn);
      });
    }

    function showCategory(catId) {
      currentCategory = catId;
      renderCategories();
      const container = document.getElementById('products');
      const filtered = menuData.products.filter(p => p.category === catId);
      container.innerHTML = '';
      filtered.forEach(product => {
        const div = document.createElement('div');
        div.className = 'product';
        div.innerHTML = `
          <div class="product-main">
            <img src="../${product.image}" alt="${product.name.el}">
            <div class="product-info">
              <div class="product-name">${product.name.el}</div>
              <div class="product-desc">${product.description?.el || ''}</div>
              <div class="product-price">${product.price.toFixed(2)} €</div>
            </div>
          </div>
          <button class="add-btn" data-name="${product.name.el}" data-price="${product.price}" data-cat="${product.category}">➕ Προσθήκη</button>
        `;
        container.appendChild(div);
      });
      document.querySelectorAll('.add-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const name = btn.getAttribute('data-name');
          const price = parseFloat(btn.getAttribute('data-price'));
          const category = btn.getAttribute('data-cat');
          addProductToCart(name, price, category);
        });
      });
    }

    function addProductToCart(productName, price, category) {
      const product = menuData.products.find(p => p.name.el === productName);
      if (!product) return;
      let options = null;
      let comment = null;
      if (categoriesWithOptions.includes(category)) options = { sugar: 'Σκέτος', substitute: null, milk: null };
      if (categoriesWithComment.includes(category)) comment = '';
      const existingIndex = cart.findIndex(item => item.product.name.el === productName && JSON.stringify(item.options) === JSON.stringify(options) && item.comment === comment);
      if (existingIndex > -1) cart[existingIndex].quantity++;
      else cart.push({ product, quantity: 1, options, comment });
      renderCart();
    }

    function openEditModal(index) {
      editIndex = index;
      const item = cart[index];
      document.getElementById('editProductName').innerHTML = `✏️ ${item.product.name.el}`;
      const opts = item.options || { sugar: 'Σκέτος', substitute: null, milk: null };
      document.getElementById('editOptions').innerHTML = `
        <div class="modal-option-group"><label>🍬 Ζάχαρη</label><div class="radio-group-modal">${['Σκέτος','Μέτριος','Γλυκός','Πολύ γλυκός'].map(v => `<label><input type="radio" name="edit_sugar" value="${v}" ${opts.sugar === v ? 'checked' : ''}> ${v}</label>`).join('')}</div></div>
        <div class="modal-option-group"><label>🌿 Υποκατάστατο</label><div class="radio-group-modal">${['','Μαύρη ζάχαρη','Στέβια','Ζαχαρίνη','Natreen'].map(v => `<label><input type="radio" name="edit_sub" value="${v}" ${opts.substitute === v ? 'checked' : ''}> ${v || 'Κανένα'}</label>`).join('')}</div></div>
        <div class="modal-option-group"><label>🥛 Γάλα</label><div class="radio-group-modal">${['','Φρέσκο γάλα','Εβαπορέ','Αμυγδάλου'].map(v => `<label><input type="radio" name="edit_milk" value="${v}" ${opts.milk === v ? 'checked' : ''}> ${v || 'Κανένα'}</label>`).join('')}</div></div>
      `;
      document.getElementById('editModal').style.display = 'flex';
    }
    function saveEdit() {
      if (editIndex === null) return;
      const sugar = document.querySelector('input[name="edit_sugar"]:checked')?.value || 'Σκέτος';
      const substitute = document.querySelector('input[name="edit_sub"]:checked')?.value;
      const milk = document.querySelector('input[name="edit_milk"]:checked')?.value;
      cart[editIndex].options = { sugar, substitute: substitute || null, milk: milk || null };
      renderCart();
      closeModal();
    }
    function closeModal() { document.getElementById('editModal').style.display = 'none'; editIndex = null; }

    function openCommentModal(index) {
      commentEditIndex = index;
      const item = cart[index];
      document.getElementById('commentProductName').innerHTML = `✏️ ${item.product.name.el}`;
      document.getElementById('commentText').value = item.comment || '';
      document.getElementById('commentModal').style.display = 'flex';
    }
    function saveComment() {
      if (commentEditIndex === null) return;
      cart[commentEditIndex].comment = document.getElementById('commentText').value;
      renderCart();
      closeCommentModal();
    }
    function closeCommentModal() { document.getElementById('commentModal').style.display = 'none'; commentEditIndex = null; }

    function removeFromCart(index) {
      if (cart[index].quantity > 1) cart[index].quantity--;
      else cart.splice(index, 1);
      renderCart();
    }

    function renderCart() {
      const container = document.getElementById('cartItems');
      let total = 0;
      container.innerHTML = '';
      cart.forEach((item, idx) => {
        const sub = item.product.price * item.quantity;
        total += sub;
        const hasOptions = categoriesWithOptions.includes(item.product.category);
        const hasComment = categoriesWithComment.includes(item.product.category);
        let extraText = '';
        if (hasOptions && item.options) extraText = `${item.options.sugar || ''} ${item.options.milk ? 'με '+item.options.milk : ''}`;
        if (hasComment && item.comment) extraText = `📝 ${item.comment}`;
        container.innerHTML += `
          <div class="cart-item">
            <div class="cart-item-details"><strong>${item.product.name.el}</strong> x${item.quantity}${extraText ? `<div class="cart-item-options">${extraText}</div>` : ''}</div>
            <div class="cart-item-controls">
              ${hasOptions ? `<button class="green-plus-btn" onclick="openEditModal(${idx})">+</button>` : ''}
              ${hasComment ? `<button class="green-plus-btn" onclick="openCommentModal(${idx})">✏️</button>` : ''}
              <button class="remove-btn" onclick="removeFromCart(${idx})">−</button>
              <span>${sub.toFixed(2)}€</span>
            </div>
          </div>
        `;
      });
      document.getElementById('cartTotal').innerText = `Σύνολο: ${total.toFixed(2)} €`;
    }

    document.getElementById('submitOrder').onclick = async () => {
      if (!cart.length) return alert('Άδειο καλάθι');
      const table = document.getElementById('tableSelect').value;
      const order = {
        table, total: cart.reduce((s,i)=> s + i.product.price*i.quantity,0),
        items: cart.map(i => ({ name: i.product.name.el, quantity: i.quantity, price: i.product.price, options: i.options, comment: i.comment || null })),
        time: new Date().toLocaleTimeString()
      };
      await firebase.database().ref('orders').push({ ...order, status: 'pending', timestamp: firebase.database.ServerValue.TIMESTAMP });
      alert('✅ Παραγγελία στάλθηκε!');
      cart = []; renderCart();
    };

    window.openEditModal = openEditModal;
    window.openCommentModal = openCommentModal;
    window.removeFromCart = removeFromCart;
    window.closeModal = closeModal;
    window.saveEdit = saveEdit;
    window.closeCommentModal = closeCommentModal;
    window.saveComment = saveComment;
    loadData();
  </script>
</body>
</html>

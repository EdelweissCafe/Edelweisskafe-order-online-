<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edelweiss Café - Online Παραγγελίες</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f0e8; padding-bottom: 80px; }
    header { background: #1e3a1e; color: white; text-align: center; padding: 20px; position: sticky; top: 0; z-index: 10; }
    .table-selector { padding: 10px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .categories { display: flex; overflow-x: auto; padding: 15px; gap: 10px; background: white; border-bottom: 1px solid #ddd; }
    .cat-btn { padding: 8px 20px; border: 1px solid #1e3a1e; border-radius: 25px; cursor: pointer; white-space: nowrap; }
    .cat-btn.active { background: #1e3a1e; color: white; }
    .products { padding: 15px; max-width: 800px; margin: 0 auto; margin-bottom: 200px; }
    .product { background: white; border-radius: 15px; margin-bottom: 15px; padding: 12px; display: flex; gap: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .product img { width: 100px; height: 100px; object-fit: cover; border-radius: 12px; }
    .product-info { flex: 1; }
    .product-name { font-weight: bold; color: #1e3a1e; }
    .product-price { font-weight: bold; color: #d4af37; }
    .add-btn { background: #1e3a1e; color: white; border: none; padding: 8px 20px; border-radius: 25px; cursor: pointer; margin-top: 8px; }
    .cart { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 3px solid #1e3a1e; padding: 15px; max-height: 50%; overflow-y: auto; }
    .cart h3 { color: #1e3a1e; margin-bottom: 10px; }
    .cart-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
    .cart-total { font-weight: bold; text-align: right; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>☕ Edelweiss Café</h1>
    <div class="table-selector">
      <label>📍 Τραπέζι:</label>
      <select id="tableSelect"></select>
    </div>
  </header>
  <div class="categories" id="categories"></div>
  <div class="products" id="products"></div>
  <div class="cart" id="cart">
    <h3>🛒 Καλάθι</h3>
    <div id="cartItems"></div>
    <div class="cart-total" id="cartTotal">Σύνολο: 0.00 €</div>
    <button id="submitOrder">✅ Υποβολή Παραγγελίας</button>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script>
    // Το Firebase Config σου
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "edelweisscafeplus.firebaseapp.com",
      databaseURL: "https://edelweisscafeplus-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "edelweisscafeplus",
      storageBucket: "edelweisscafeplus.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Τραπέζια
    const tables = ["1","2","3","4","5"];
    const tableSelect = document.getElementById('tableSelect');
    tables.forEach(t => tableSelect.innerHTML += `<option value="${t}">Τραπέζι ${t}</option>`);

    // Παράδειγμα προϊόντων
    const categories = [
      {id:"c1", name:"Ροφήματα"},
      {id:"c2", name:"Γλυκά"}
    ];
    const products = [
      {id:"p1", name:"Καφές", category:"c1", price:2.5},
      {id:"p2", name:"Τσάι", category:"c1", price:2.0},
      {id:"p3", name:"Τούρτα Σοκολάτα", category:"c2", price:4.5}
    ];

    // Categories buttons
    let currentCategory = categories[0].id;
    function renderCategories() {
      const container = document.getElementById('categories');
      container.innerHTML = '';
      categories.forEach(c => {
        const btn = document.createElement('button');
        btn.className = `cat-btn ${c.id===currentCategory?'active':''}`;
        btn.textContent = c.name;
        btn.onclick = () => { currentCategory=c.id; renderProducts(); renderCategories(); };
        container.appendChild(btn);
      });
    }

    // Products
    let cart = [];
    function renderProducts() {
      const container = document.getElementById('products');
      container.innerHTML = '';
      products.filter(p=>p.category===currentCategory).forEach(p=>{
        const div = document.createElement('div');
        div.className = 'product';
        div.innerHTML = `<div class="product-info"><strong>${p.name}</strong> - ${p.price.toFixed(2)} € <button class="add-btn">➕</button></div>`;
        container.appendChild(div);
        div.querySelector('.add-btn').onclick = ()=>{ addToCart(p); };
      });
    }

    function addToCart(product){
      const existing = cart.find(c=>c.id===product.id);
      if(existing) existing.qty++; else cart.push({...product, qty:1});
      renderCart();
    }

    function renderCart(){
      const container = document.getElementById('cartItems');
      const totalEl = document.getElementById('cartTotal');
      container.innerHTML='';
      let total=0;
      cart.forEach(item=>{
        total+=item.price*item.qty;
        container.innerHTML += `<div class="cart-item">${item.name} x${item.qty} - ${(item.price*item.qty).toFixed(2)} €</div>`;
      });
      totalEl.textContent=`Σύνολο: ${total.toFixed(2)} €`;
    }

    document.getElementById('submitOrder').onclick = ()=>{
      const table = tableSelect.value;
      const order = { table, items:cart.map(c=>({name:c.name, qty:c.qty, price:c.price})), time: new Date().toLocaleTimeString() };
      db.ref('orders').push(order);
      alert('✅ Η παραγγελία αποθηκεύτηκε!');
      cart=[]; renderCart();
    };

    renderCategories(); renderProducts();
  </script>
</body>
</html>

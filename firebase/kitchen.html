
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onChildAdded } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics.js";


const firebaseConfig = {
  apiKey: "AlzaSyBzp2V3rskL_B2vVqIa2ding3AoUPLVUyA",
  authDomain: "edelweisscafeplus.firebaseapp.com",
  projectId: "edelweisscafeplus",
  storageBucket: "edelweisscafeplus.appspot.com",
  messagingSenderId: "643023210296",
  appId: "1:643023210296:web:45d0e77431f946249023cd",
  measurementId: "G-X2BTBZ3N5G"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const database = getDatabase(app);


// Listen for orders
const ordersRef = ref(database, 'orders');
onChildAdded(ordersRef, (snapshot) => {
  const order = snapshot.val();
  const div = document.createElement('div');
  div.textContent = "Order: " + order.item + ", Qty: " + order.qty;
  document.body.appendChild(div);
});
</script>
</head>
<body>
<h1>Kitchen Page</h1>
<div id="orders"></div>
</body>
</html>

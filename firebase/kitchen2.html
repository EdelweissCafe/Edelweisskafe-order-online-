<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edelweiss Café - Οθόνη Κουζίνας</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Courier New', monospace; 
      background: #1a1a2e; 
      padding: 20px;
      min-height: 100vh;
    }
    h1 { 
      text-align: center; 
      color: #d4af37; 
      margin-bottom: 30px;
      font-size: 2.5em;
    }
    .orders-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }
    .order-card {
      background: #16213e;
      border-radius: 20px;
      padding: 20px;
      min-width: 300px;
      flex: 1;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      border-left: 8px solid #d4af37;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      border-bottom: 2px solid #d4af37;
      padding-bottom: 10px;
      margin-bottom: 15px;
    }
    .table-num {
      font-size: 1.8em;
      font-weight: bold;
      color: #d4af37;
    }
    .time {
      color: #888;
      font-size: 0.9em;
    }
    .order-items {
      list-style: none;
      margin: 15px 0;
    }
    .order-items li {
      padding: 8px 0;
      border-bottom: 1px solid #2a2a4a;
      font-size: 1.1em;
      color: white;
    }
    .order-total {
      font-size: 1.3em;
      font-weight: bold;
      text-align: right;
      margin-top: 15px;
      color: #d4af37;
    }
    .complete-btn {
      background: #d4af37;
      color: #16213e;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
      width: 100%;
      transition: transform 0.2s;
    }
    .complete-btn:hover {
      transform: scale(1.02);
    }
    .no-orders {
      text-align: center;
      padding: 60px;
      color: #888;
      font-size: 1.5em;
    }
  </style>
</head>
<body>
  <h1>🍽️ ΟΘΟΝΗ ΚΟΥΖΙΝΑΣ - ΜΠΑΡ</h1>
  <div class="orders-container" id="orders-container">
    <div class="no-orders">⏳ Περιμένοντας παραγγελίες...</div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBzp2V3rskL_B2vVqIa2ding3AoUPLVUyA",
      authDomain: "edelweisscafeplus.firebaseapp.com",
      databaseURL: "https://edelweisscafeplus-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "edelweisscafeplus",
      storageBucket: "edelweisscafeplus.firebasestorage.app",
      messagingSenderId: "643023210296",
      appId: "1:643023210296:web:45d0e77431f946249023cd",
      measurementId: "G-X2BTBZ3N5G"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ΗΧΟΣ ΚΛΑΣΙΚΟΥ ΤΗΛΕΦΩΝΟΥ (από το MP3 που ανέβασες)
    let ringtone = null;
    
    function playSound() {
      try {
        if (!ringtone) {
          ringtone = new Audio('phone.mp3');
          ringtone.load();
        }
        ringtone.volume = 1.0; // Μέγιστη ένταση
        ringtone.currentTime = 0;
        ringtone.play().catch(e => console.log('Play error:', e));
      } catch(e) {
        console.log('Sound error:', e);
      }
      
      if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
    }

    function displayOrder(orderId, order) {
      const container = document.getElementById('orders-container');
      
      if (container.querySelector('.no-orders')) {
        container.innerHTML = '';
      }
      
      const card = document.createElement('div');
      card.className = 'order-card';
      card.id = `order-${orderId}`;
      
      let itemsHtml = '';
      if (order.items && order.items.length > 0) {
        order.items.forEach(item => {
          const subtotal = (item.price || 0) * (item.quantity || 1);
          itemsHtml += `<li>${item.quantity || 1}x ${item.name} - ${subtotal.toFixed(2)}€</li>`;
        });
      } else {
        itemsHtml = '<li>Παραγγελία χωρίς προϊόντα</li>';
      }
      
      card.innerHTML = `
        <div class="order-header">
          <span class="table-num">Τραπέζι ${order.table || '?'}</span>
          <span class="time">${order.time || new Date().toLocaleTimeString()}</span>
        </div>
        <ul class="order-items">${itemsHtml}</ul>
        <div class="order-total">Σύνολο: ${(order.total || 0).toFixed(2)}€</div>
        <button class="complete-btn" onclick="completeOrder('${orderId}')">✅ ΟΛΟΚΛΗΡΩΘΗΚΕ</button>
      `;
      
      container.insertBefore(card, container.firstChild);
      playSound();
      
      setTimeout(() => {
        card.style.animation = 'none';
      }, 500);
    }

    function completeOrder(orderId) {
      const orderRef = firebase.database().ref(`orders/${orderId}`);
      orderRef.update({ status: 'completed' });
      const card = document.getElementById(`order-${orderId}`);
      if (card) card.remove();
      
      const container = document.getElementById('orders-container');
      if (container.children.length === 0) {
        container.innerHTML = '<div class="no-orders">✅ ΟΛΕΣ ΟΙ ΠΑΡΑΓΓΕΛΙΕΣ ΕΧΟΥΝ ΟΛΟΚΛΗΡΩΘΕΙ!</div>';
      }
    }

    const ordersRef = firebase.database().ref('orders');
    
    ordersRef.on('child_added', (snapshot) => {
      const order = snapshot.val();
      if (order.status !== 'completed') {
        displayOrder(snapshot.key, order);
      }
    });
    
    ordersRef.on('child_changed', (snapshot) => {
      const order = snapshot.val();
      if (order.status === 'completed') {
        const card = document.getElementById(`order-${snapshot.key}`);
        if (card) card.remove();
      }
    });

    ordersRef.once('value', (snapshot) => {
      snapshot.forEach((childSnapshot) => {
        const order = childSnapshot.val();
        if (order.status !== 'completed') {
          displayOrder(childSnapshot.key, order);
        }
      });
    });
  </script>
</body>
</html>

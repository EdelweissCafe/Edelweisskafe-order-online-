<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edelweiss Café - Οθόνη Κουζίνας</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Courier New', monospace; 
      background: #1a1a2e; 
      padding: 20px;
      min-height: 100vh;
    }
    h1 { 
      text-align: center; 
      color: #d4af37; 
      margin-bottom: 30px;
      font-size: 2.5em;
    }
    .orders-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }
    .order-card {
      background: #16213e;
      border-radius: 20px;
      padding: 20px;
      min-width: 300px;
      flex: 1;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      border-left: 8px solid #d4af37;
      animation: slideIn 0.5s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      border-bottom: 2px solid #d4af37;
      padding-bottom: 10px;
      margin-bottom: 15px;
    }
    .table-num {
      font-size: 1.8em;
      font-weight: bold;
      color: #d4af37;
    }
    .time {
      color: #888;
      font-size: 0.9em;
    }
    .order-items {
      list-style: none;
      margin: 15px 0;
    }
    .order-items li {
      padding: 8px 0;
      border-bottom: 1px solid #2a2a4a;
      font-size: 1.1em;
    }
    .order-total {
      font-size: 1.3em;
      font-weight: bold;
      text-align: right;
      margin-top: 15px;
      color: #d4af37;
    }
    .complete-btn {
      background: #d4af37;
      color: #16213e;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
      width: 100%;
      transition: transform 0.2s;
    }
    .complete-btn:hover {
      transform: scale(1.02);
    }
    .no-orders {
      text-align: center;
      padding: 60px;
      color: #888;
      font-size: 1.5em;
    }
  </style>
</head>
<body>
  <h1>🍽️ ΟΘΟΝΗ ΚΟΥΖΙΝΑΣ - ΜΠΑΡ</h1>
  <div class="orders-container" id="orders-container">
    <div class="no-orders">⏳ Περιμένοντας παραγγελίες...</div>
  </div>

  <script>
    let audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
    let orders = [];
    
    // Φόρτωσε τις υπάρχουσες παραγγελίες από το localStorage
    function loadOrders() {
      const savedOrders = localStorage.getItem('kitchen_orders_list');
      if (savedOrders) {
        try {
          orders = JSON.parse(savedOrders);
        } catch(e) {}
      }
      displayOrders();
    }
    
    // Έλεγχος για νέα παραγγελία
    function checkForNewOrder() {
      const newOrderRaw = localStorage.getItem('kitchen_new_order');
      if (newOrderRaw) {
        localStorage.removeItem('kitchen_new_order');
        try {
          const newOrder = JSON.parse(newOrderRaw);
          newOrder.id = Date.now().toString();
          orders.unshift(newOrder);
          saveOrders();
          playSoundAndVibrate();
          displayOrders();
        } catch(e) {}
      }
    }
    
    // Αποθήκευση όλων των παραγγελιών
    function saveOrders() {
      localStorage.setItem('kitchen_orders_list', JSON.stringify(orders));
    }
    
    function playSoundAndVibrate() {
      audio.play();
      if (navigator.vibrate) navigator.vibrate(500);
    }
    
    function displayOrders() {
      const container = document.getElementById('orders-container');
      if (orders.length === 0) {
        container.innerHTML = '<div class="no-orders">✅ ΟΛΕΣ ΟΙ ΠΑΡΑΓΓΕΛΙΕΣ ΕΧΟΥΝ ΟΛΟΚΛΗΡΩΘΕΙ!</div>';
        return;
      }
      
      container.innerHTML = '';
      orders.forEach(order => {
        const card = document.createElement('div');
        card.className = 'order-card';
        let itemsHtml = '';
        order.items.forEach(item => {
          const subtotal = item.price * item.quantity;
          itemsHtml += `<li>${item.quantity}x ${item.name} - ${subtotal.toFixed(2)}€</li>`;
        });
        card.innerHTML = `
          <div class="order-header">
            <span class="table-num">Τραπέζι ${order.table}</span>
            <span class="time">${order.time}</span>
          </div>
          <ul class="order-items">${itemsHtml}</ul>
          <div class="order-total">Σύνολο: ${order.total.toFixed(2)}€</div>
          <button class="complete-btn" onclick="completeOrder('${order.id}')">✅ ΟΛΟΚΛΗΡΩΘΗΚΕ</button>
        `;
        container.appendChild(card);
      });
    }
    
    function completeOrder(orderId) {
      orders = orders.filter(o => o.id !== orderId);
      saveOrders();
      displayOrders();
    }
    
    // Έλεγχος κάθε 2 δευτερόλεπτα για νέες παραγγελίες
    setInterval(checkForNewOrder, 2000);
    
    // Φόρτωσε υπάρχουσες παραγγελίες
    loadOrders();
  </script>
</body>
</html>

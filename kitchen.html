<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edelweiss Café - ΟΘΟΝΗ ΚΟΥΖΙΝΑΣ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Courier New', monospace; 
      background: #1a1a2e; 
      padding: 20px;
    }
    h1 { 
      text-align: center; 
      color: #d4af37; 
      margin-bottom: 30px;
      font-size: 2em;
    }
    .orders-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }
    .order-card {
      background: #16213e;
      border-radius: 20px;
      padding: 20px;
      min-width: 280px;
      border-left: 8px solid #d4af37;
      margin-bottom: 15px;
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      border-bottom: 2px solid #d4af37;
      padding-bottom: 10px;
      margin-bottom: 15px;
    }
    .table-num {
      font-size: 1.5em;
      font-weight: bold;
      color: #d4af37;
    }
    .time {
      color: #888;
      font-size: 0.8em;
    }
    .order-items {
      list-style: none;
      margin: 15px 0;
    }
    .order-items li {
      padding: 5px 0;
      color: white;
    }
    .order-total {
      font-size: 1.2em;
      font-weight: bold;
      text-align: right;
      margin-top: 15px;
      color: #d4af37;
    }
    .complete-btn {
      background: #d4af37;
      color: #16213e;
      border: none;
      padding: 8px 15px;
      border-radius: 10px;
      font-size: 0.9em;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
      width: 100%;
    }
    .no-orders {
      text-align: center;
      padding: 60px;
      color: #888;
      font-size: 1.2em;
    }
  </style>
</head>
<body>
  <h1>🍽️ ΟΘΟΝΗ ΚΟΥΖΙΝΑΣ - ΜΠΑΡ</h1>
  <div class="orders-container" id="orders-container">
    <div class="no-orders">⏳ Περιμένοντας παραγγελίες...</div>
  </div>

  <script>
    let audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
    let orders = [];
    
    function loadOrders() {
      const saved = localStorage.getItem('kitchen_orders_list');
      if (saved) {
        try {
          orders = JSON.parse(saved);
        } catch(e) {}
      }
      displayOrders();
    }
    
    function checkForNewOrder() {
      const newOrder = localStorage.getItem('kitchen_new_order');
      if (newOrder) {
        localStorage.removeItem('kitchen_new_order');
        try {
          const order = JSON.parse(newOrder);
          order.id = Date.now().toString();
          orders.unshift(order);
          localStorage.setItem('kitchen_orders_list', JSON.stringify(orders));
          audio.play();
          if (navigator.vibrate) navigator.vibrate(500);
          displayOrders();
        } catch(e) {}
      }
    }
    
    function displayOrders() {
      const container = document.getElementById('orders-container');
      if (orders.length === 0) {
        container.innerHTML = '<div class="no-orders">✅ ΟΛΕΣ ΟΙ ΠΑΡΑΓΓΕΛΙΕΣ ΕΧΟΥΝ ΟΛΟΚΛΗΡΩΘΕΙ!</div>';
        return;
      }
      
      container.innerHTML = '';
      orders.forEach(order => {
        const card = document.createElement('div');
        card.className = 'order-card';
        let itemsHtml = '';
        order.items.forEach(item => {
          itemsHtml += `<li>${item.quantity}x ${item.name} - ${(item.price * item.quantity).toFixed(2)}€</li>`;
        });
        card.innerHTML = `
          <div class="order-header">
            <span class="table-num">Τραπέζι ${order.table}</span>
            <span class="time">${order.time}</span>
          </div>
          <ul class="order-items">${itemsHtml}</ul>
          <div class="order-total">Σύνολο: ${order.total.toFixed(2)}€</div>
          <button class="complete-btn" onclick="completeOrder('${order.id}')">✅ ΟΛΟΚΛΗΡΩΘΗΚΕ</button>
        `;
        container.appendChild(card);
      });
    }
    
    function completeOrder(orderId) {
      orders = orders.filter(o => o.id !== orderId);
      localStorage.setItem('kitchen_orders_list', JSON.stringify(orders));
      displayOrders();
    }
    
    setInterval(checkForNewOrder, 2000);
    loadOrders();
  </script>
</body>
</html>
